# nginx/admissional.conf
# Proxy reverso para o Admissional Bot
#
# Passos para ativar:
#   sudo cp nginx/admissional.conf /etc/nginx/sites-available/admissional
#   sudo ln -sf /etc/nginx/sites-available/admissional /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para HTTPS (após ter o domínio apontando para o VPS):
#   sudo certbot --nginx -d SEU_DOMINIO
#   (certbot reescreve este arquivo automaticamente com os blocos SSL)

server {
    listen 80;
    server_name 129.121.49.26;

    # Tamanho máximo de upload (útil para o webhook)
    client_max_body_size 10M;

    # ── Webhook da Evolution API ──────────────────────────────────────────────
    location /webhook/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API do painel (auth, candidatos, agendamentos, logs, disparos) ────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Healthcheck ───────────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── SPA (painel web — HTML/CSS/JS estático servido pelo FastAPI) ──────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Cache de assets estáticos (CSS, JS)
        proxy_cache_bypass $http_upgrade;
    }
}
