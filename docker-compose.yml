version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Admissional Bot — Orquestração com Docker Compose
#
# Sobe dois serviços:
#   1. evolution-api  → WhatsApp gateway (porta 8080, acessada só internamente)
#   2. bot            → FastAPI + scheduler + painel web (porta 8000)
#
# O Nginx no host age como proxy reverso na frente do bot (porta 80/443).
# A Evolution API fica atrás do bot — não é exposta ao mundo externo.
#
# Uso:
#   docker compose up -d           # Subir
#   docker compose logs -f bot     # Ver logs do bot
#   docker compose restart bot     # Reiniciar após mudanças no .env
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Evolution API (WhatsApp Gateway) ───────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: admissional_evolution
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # Exposta apenas no localhost do VPS
    environment:
      SERVER_URL: "http://localhost:8080"
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      # Webhook global — aponta para o bot (dentro da rede Docker)
      WEBHOOK_GLOBAL_URL: "http://bot:8000/webhook/evolution"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # Configurações de sessão
      DEL_INSTANCE: "false"
      # Banco de dados da Evolution (SQLite interno)
      DATABASE_ENABLED: "false"
      # Logs
      LOG_LEVEL: "ERROR"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Admissional Bot (FastAPI) ───────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admissional_bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # Exposta apenas no localhost — Nginx faz proxy
    env_file:
      - .env
    environment:
      # Override para apontar para o container da Evolution API
      EVOLUTION_API_URL: "http://evolution-api:8080"
    volumes:
      - ./db:/app/db                       # Persiste o SQLite fora do container
      - ./credentials.json:/app/credentials.json:ro  # Google Sheets (read-only)
    depends_on:
      evolution-api:
        condition: service_healthy
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  evolution_instances:

networks:
  botnet:
    driver: bridge
